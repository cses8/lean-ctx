stages:
  - build
  - release

variables:
  CARGO_HOME: "${CI_PROJECT_DIR}/.cargo"

.rust-cache:
  cache:
    key: "${CI_JOB_NAME}-${CI_COMMIT_REF_SLUG}"
    paths:
      - .cargo/registry
      - target/

build:linux-x86:
  stage: build
  image: rust:latest
  extends: .rust-cache
  script:
    - rustup target add x86_64-unknown-linux-gnu
    - cargo build --release --target x86_64-unknown-linux-gnu
    - mkdir -p artifacts
    - cp target/x86_64-unknown-linux-gnu/release/lean-ctx artifacts/lean-ctx-linux-x86_64
  artifacts:
    paths:
      - artifacts/lean-ctx-linux-x86_64
    expire_in: 1 week

build:linux-arm64:
  stage: build
  image: rust:latest
  extends: .rust-cache
  script:
    - apt-get update && apt-get install -y gcc-aarch64-linux-gnu
    - rustup target add aarch64-unknown-linux-gnu
    - export CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc
    - cargo build --release --target aarch64-unknown-linux-gnu
    - mkdir -p artifacts
    - cp target/aarch64-unknown-linux-gnu/release/lean-ctx artifacts/lean-ctx-linux-aarch64
  artifacts:
    paths:
      - artifacts/lean-ctx-linux-aarch64
    expire_in: 1 week

build:macos-arm64:
  stage: build
  tags:
    - macos
  extends: .rust-cache
  script:
    - cargo build --release
    - mkdir -p artifacts
    - cp target/release/lean-ctx artifacts/lean-ctx-macos-arm64
  artifacts:
    paths:
      - artifacts/lean-ctx-macos-arm64
    expire_in: 1 week
  allow_failure: true

release:
  stage: release
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  needs:
    - build:linux-x86
    - build:linux-arm64
  rules:
    - if: $CI_COMMIT_TAG
  script:
    - echo "Creating release for ${CI_COMMIT_TAG}"
  release:
    tag_name: "${CI_COMMIT_TAG}"
    description: "lean-ctx ${CI_COMMIT_TAG} — Smart Context MCP Server"
    assets:
      links:
        - name: "lean-ctx-linux-x86_64"
          url: "${CI_PROJECT_URL}/-/jobs/artifacts/${CI_COMMIT_TAG}/raw/artifacts/lean-ctx-linux-x86_64?job=build:linux-x86"
          filepath: "/binaries/lean-ctx-linux-x86_64"
        - name: "lean-ctx-linux-aarch64"
          url: "${CI_PROJECT_URL}/-/jobs/artifacts/${CI_COMMIT_TAG}/raw/artifacts/lean-ctx-linux-aarch64?job=build:linux-arm64"
          filepath: "/binaries/lean-ctx-linux-aarch64"
